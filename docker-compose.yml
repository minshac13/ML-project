version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    # 🔥 1. Maps your current directory (.) to the container's working directory (/app)
    volumes:
      - .:/app
      - /app/__pycache__  # Anonymous volume protecting container cache performance
    # 🔥 2. Overrides the static CMD to turn on Uvicorn's live file watcher
    command: uvicorn api_server:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_URI=${MONGO_URI}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    # 🔥 3. Map your frontend folder files dynamically as well
    volumes:
      - .:/app
    # Note: Streamlit has automated page hot-reloading active out of the box!
    environment:
      - BACKEND_URL=http://backend:8000